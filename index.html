    "essence": "אבקת פריחה מתוקה, חריפה וניטרלית. יכולת כפולה של עצירת דימום, הנעת דם ושבירת סטגנציות. משפיע על דיסמנוריאה וכאבים בחזה ובבטן. (מושחם = סופח יותר, טרי = מניע יותר). אזהרות: מניע, ולכן דורש זהירות רבה בהריון.",
    "block": 3
  },
  {
    "id": "237",
    "pinyin_name": "Bai Mao Gen",
    "category": "מפסיקי דימום",
    "tier": "B",
    "essence": "קנה שורש מתוק וקר. מקרר דם לעצירת דימום מחום (פלג גוף עליון, שתן). מטהר חום מריאות וקיבה (בחילות, הקאות וצמא) ומעודד שתן לבצקות וצהבת מלחות חמה. אזהרות: קר, אסור בחולשת יאנג או קור בטחול וקיבה.",
    "block": 3
  }
];

/* ============================================================
   CONSTANTS
   ============================================================ */
const TIER_SETS = {
  easy: ['A'],
  medium: ['A', 'B'],
  hardcore: ['A', 'B', 'C'],
};
const TIER_LABELS = {
  easy: 'קל (A)',
  medium: 'בינוני (A+B)',
  hardcore: 'קשוח (A+B+C)',
};
const MAX_LIVES = 6;
const GROUP_COLORS = [
  { bg: 'bg-amber-400', text: 'text-amber-950' },
  { bg: 'bg-emerald-400', text: 'text-emerald-950' },
  { bg: 'bg-sky-400', text: 'text-sky-950' },
  { bg: 'bg-violet-400', text: 'text-violet-950' },
];

/* ============================================================
   STATE
   ============================================================ */
const state = {
  screen: 'setup', // 'setup' | 'game' | 'victory'
  selectedBlock: null,
  selectedTier: null,
  categories: [],
  pools: {},
  initialTotal: 0,
  roundNumber: 1,
  currentTiles: [],
  solvedGroups: [],
  selectedTileUids: [],
  lives: MAX_LIVES,
  roundOver: false,
};

let uidCounter = 0;
function makeUid() { return 'h' + (uidCounter++); }

/* ============================================================
   UTILITIES
   ============================================================ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function sample(arr, n) { return shuffle(arr.slice()).slice(0, n); }
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
function getCategoriesForBlock(blockNum) {
  return [...new Set(herbsDatabase.filter(h => h.block === blockNum).map(h => h.category))];
}
function getEligibleCategories(blockNum, tierSet) {
  return getCategoriesForBlock(blockNum).filter(cat =>
    herbsDatabase.filter(h => h.category === cat && tierSet.includes(h.tier)).length >= 4
  );
}
function toast(msg, type = 'info', duration = 1800) {
  const container = document.getElementById('toast-container');
  const div = document.createElement('div');
  div.className = 'toast px-4 py-2 rounded-xl shadow-lg font-medium text-sm max-w-xs text-center ' +
    (type === 'error' ? 'bg-rose-500 text-white' : type === 'success' ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-100 border border-slate-600');
  div.textContent = msg;
  container.appendChild(div);
  setTimeout(() => {
    div.style.transition = 'opacity .3s';
    div.style.opacity = '0';
    setTimeout(() => div.remove(), 300);
  }, duration);
}

/* ============================================================
   ESSENCE MODAL (long-press / right-click)
   ============================================================ */
function openEssenceModal(herb) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div id="essence-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
      <div class="animate-pop bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl max-w-md w-full p-6 relative">
        <button id="essence-close" class="absolute top-3 left-3 text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
        <div class="text-xs uppercase tracking-wide text-indigo-400 font-semibold mb-1">${escapeHtml(herb.category)}</div>
        <div class="text-2xl font-bold mb-3">${escapeHtml(herb.pinyin_name)}</div>
        <p class="text-slate-200 leading-relaxed text-base">${escapeHtml(herb.essence)}</p>
      </div>
    </div>`;
  document.getElementById('essence-overlay').addEventListener('click', e => {
    if (e.target.id === 'essence-overlay') closeEssenceModal();
  });
  document.getElementById('essence-close').addEventListener('click', closeEssenceModal);
}
function closeEssenceModal() { document.getElementById('modal-root').innerHTML = ''; }

/* ============================================================
   GAME ENGINE — pools, backfill, rounds
   ============================================================ */
function buildPools() {
  state.pools = {};
  state.initialTotal = 0;
  const tierSet = TIER_SETS[state.selectedTier];
  for (const cat of state.categories) {
    const list = herbsDatabase.filter(h => h.category === cat && tierSet.includes(h.tier));
    shuffle(list);
    state.pools[cat] = { unseen: list.slice(), seen: [] };
    state.initialTotal += list.length;
  }
}

function pullForCategory(cat) {
  const pool = state.pools[cat];
  const freshCount = Math.min(4, pool.unseen.length);
  const fresh = pool.unseen.splice(0, freshCount);
  pool.seen.push(...fresh);
  const picks = fresh.slice();
  const needed = 4 - fresh.length;
  if (needed > 0) {
    const candidates = pool.seen.filter(h => !fresh.includes(h));
    picks.push(...sample(candidates, Math.min(needed, candidates.length)));
    // safety net: category has fewer than 4 herbs total for this tier config
    while (picks.length < 4 && pool.seen.length) {
      picks.push(pool.seen[Math.floor(Math.random() * pool.seen.length)]);
    }
  }
  return picks.map(h => ({ ...h, tileUid: makeUid() }));
}

function totalUnseenRemaining() {
  return state.categories.reduce((sum, cat) => sum + state.pools[cat].unseen.length, 0);
}

function generateRound() {
  let tiles = [];
  for (const cat of state.categories) tiles.push(...pullForCategory(cat));
  shuffle(tiles);
  state.currentTiles = tiles;
  state.selectedTileUids = [];
  state.lives = MAX_LIVES;
  state.solvedGroups = [];
  state.roundOver = false;
  render();
}

function startGame() {
  const tierSet = TIER_SETS[state.selectedTier];
  const eligible = getEligibleCategories(state.selectedBlock, tierSet);
  state.categories = shuffle(eligible.slice()).slice(0, 4);
  state.roundNumber = 1;
  state.screen = 'game';
  buildPools();
  generateRound();
}

function resetToSetup() {
  Object.assign(state, {
    screen: 'setup', selectedBlock: null, selectedTier: null, categories: [], pools: {},
    initialTotal: 0, currentTiles: [], solvedGroups: [], selectedTileUids: [], roundNumber: 1,
    lives: MAX_LIVES, roundOver: false,
  });
  render();
}

function showVictory() { state.screen = 'victory'; render(); }

function proceedAfterRound() {
  if (totalUnseenRemaining() === 0) showVictory();
  else { state.roundNumber += 1; generateRound(); }
}

/* ============================================================
   GAMEPLAY — selection, submit, lives
   ============================================================ */
function toggleTileSelection(uid) {
  if (state.roundOver) return;
  const idx = state.selectedTileUids.indexOf(uid);
  if (idx >= 0) state.selectedTileUids.splice(idx, 1);
  else {
    if (state.selectedTileUids.length >= 4) return;
    state.selectedTileUids.push(uid);
  }
  render();
}

function revealRemaining() {
  const byCat = {};
  for (const h of state.currentTiles) (byCat[h.category] = byCat[h.category] || []).push(h);
  for (const cat of Object.keys(byCat)) {
    state.solvedGroups.push({ category: cat, colorIdx: state.categories.indexOf(cat), herbs: byCat[cat], revealed: true });
  }
  state.currentTiles = [];
  state.selectedTileUids = [];
}

function shakeGrid() {
  const grid = document.getElementById('tiles-grid');
  if (!grid) return;
  grid.classList.remove('animate-shake');
  void grid.offsetWidth;
  grid.classList.add('animate-shake');
}

function handleSubmit() {
  if (state.selectedTileUids.length !== 4 || state.roundOver) return;
  const selectedHerbs = state.currentTiles.filter(h => state.selectedTileUids.includes(h.tileUid));
  const cats = selectedHerbs.map(h => h.category);
  const allSame = cats.every(c => c === cats[0]);

  if (allSame) {
    const cat = cats[0];
    state.solvedGroups.push({ category: cat, colorIdx: state.categories.indexOf(cat), herbs: selectedHerbs, revealed: false });
    state.currentTiles = state.currentTiles.filter(h => !state.selectedTileUids.includes(h.tileUid));
    state.selectedTileUids = [];
    toast('קבוצה נכונה! 🎉', 'success');
    if (state.currentTiles.length === 0) state.roundOver = true;
  } else {
    state.lives -= 1;
    const counts = {};
    cats.forEach(c => counts[c] = (counts[c] || 0) + 1);
    const maxCount = Math.max(...Object.values(counts));
    toast(maxCount === 3 ? 'קרוב מאוד...' : 'לא נכון, נסו שוב', 'error');
    shakeGrid();
    if (state.lives <= 0) {
      revealRemaining();
      state.roundOver = true;
    }
  }
  render();
}

/* ============================================================
   RENDERING
   ============================================================ */
function render() {
  if (state.screen === 'setup') renderSetup();
  else if (state.screen === 'game') renderGame();
  else renderVictory();
}

function renderSetup() {
  const app = document.getElementById('app');

  if (!herbsDatabase || herbsDatabase.length === 0) {
    app.innerHTML = `
      <div class="max-w-md text-center text-slate-300 mt-20">
        <div class="text-2xl font-bold mb-2">לא נמצאו נתונים</div>
        <p>יש להדביק את מאגר הצמחים למשתנה <code class="bg-slate-800 px-1 rounded">herbsDatabase</code> בקוד.</p>
      </div>`;
    return;
  }

  const blocks = [1, 2, 3].map(num => ({ num, categories: getCategoriesForBlock(num) }));

  app.innerHTML = `
    <div class="w-full max-w-2xl flex flex-col gap-8 mt-4">
      <div class="text-center">
        <h1 class="text-3xl font-extrabold bg-gradient-to-l from-indigo-400 to-emerald-400 bg-clip-text text-transparent">קונקשנז - צמחי מרפא</h1>
        <p class="text-slate-400 mt-1 text-sm">בחרו בלוק סילבוס ורמת קושי כדי להתחיל</p>
      </div>
      <div>
        <div class="text-sm font-bold text-slate-300 mb-2">בלוק סילבוס</div>
        <div id="block-options" class="grid grid-cols-1 sm:grid-cols-3 gap-3"></div>
      </div>
      <div>
        <div class="text-sm font-bold text-slate-300 mb-2">רמת קושי</div>
        <div id="tier-options" class="grid grid-cols-1 sm:grid-cols-3 gap-3"></div>
      </div>
      <button id="btn-start" class="mx-auto px-8 py-3 rounded-xl bg-indigo-500 text-white font-bold text-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-indigo-400 transition">
        התחל משחק
      </button>
    </div>`;

  const blockContainer = document.getElementById('block-options');
  for (const b of blocks) {
    const card = document.createElement('button');
    card.type = 'button';
    const selected = state.selectedBlock === b.num;
    card.className = 'text-right p-4 rounded-xl border transition ' +
      (selected ? 'bg-indigo-500/20 border-indigo-400 ring-2 ring-indigo-400' : 'bg-slate-800/60 border-slate-700 hover:border-slate-500');
    card.innerHTML = `
      <div class="font-bold">בלוק ${b.num}</div>
      <div class="text-xs text-slate-400 mt-1">${b.categories.length} קטגוריות</div>
      <div class="text-[11px] text-slate-500 mt-2 leading-snug">${b.categories.slice(0, 4).map(escapeHtml).join(', ')}${b.categories.length > 4 ? '…' : ''}</div>`;
    card.addEventListener('click', () => { state.selectedBlock = b.num; render(); });
    blockContainer.appendChild(card);
  }

  const tierContainer = document.getElementById('tier-options');
  for (const key of ['easy', 'medium', 'hardcore']) {
    const tierSet = TIER_SETS[key];
    let eligibleCount = null, disabled = false;
    if (state.selectedBlock) {
      eligibleCount = getEligibleCategories(state.selectedBlock, tierSet).length;
      disabled = eligibleCount < 4;
    }
    const selected = state.selectedTier === key && !disabled;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.disabled = disabled;
    btn.className = 'text-center p-4 rounded-xl border transition ' +
      (disabled ? 'bg-slate-900 border-slate-800 text-slate-600 cursor-not-allowed'
        : selected ? 'bg-indigo-500/20 border-indigo-400 ring-2 ring-indigo-400'
        : 'bg-slate-800/60 border-slate-700 hover:border-slate-500');
    btn.innerHTML = `<div class="font-bold">${TIER_LABELS[key]}</div>` +
      (state.selectedBlock
        ? `<div class="text-[11px] mt-1 ${disabled ? 'text-rose-400' : 'text-slate-500'}">${disabled ? `לא זמין בבלוק זה (נדרשות 4 קטגוריות, קיימות רק ${eligibleCount})` : `${eligibleCount} קטגוריות זמינות`}</div>`
        : '');
    if (!disabled) btn.addEventListener('click', () => { state.selectedTier = key; render(); });
    tierContainer.appendChild(btn);
  }

  const startBtn = document.getElementById('btn-start');
  const tierSetSel = state.selectedTier ? TIER_SETS[state.selectedTier] : null;
  const validCombo = state.selectedBlock && tierSetSel && getEligibleCategories(state.selectedBlock, tierSetSel).length >= 4;
  startBtn.disabled = !validCombo;
  startBtn.addEventListener('click', startGame);
}

function tileClasses(herb) {
  const selected = state.selectedTileUids.includes(herb.tileUid);
  return 'tile-btn h-[72px] sm:h-24 w-full rounded-lg sm:rounded-xl p-1 sm:p-2 flex items-center justify-center text-center font-semibold text-[13px] sm:text-base leading-tight select-none transition-all duration-150 border ' +
    (selected
      ? 'bg-indigo-500 text-white border-indigo-300 ring-4 ring-indigo-400/50 scale-[0.97]'
      : 'bg-white/95 text-slate-900 border-slate-300 hover:bg-white hover:-translate-y-0.5 shadow');
}

function createTileElement(herb) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = tileClasses(herb);
  btn.textContent = herb.pinyin_name;
  btn.dataset.uid = herb.tileUid;

  let pressTimer = null;
  let longPressTriggered = false;

  const startPress = () => {
    longPressTriggered = false;
    pressTimer = setTimeout(() => {
      longPressTriggered = true;
      openEssenceModal(herb);
    }, 500);
  };
  const cancelPress = () => clearTimeout(pressTimer);

  btn.addEventListener('pointerdown', startPress);
  btn.addEventListener('pointerup', cancelPress);
  btn.addEventListener('pointerleave', cancelPress);
  btn.addEventListener('pointercancel', cancelPress);
  btn.addEventListener('contextmenu', e => {
    e.preventDefault();
    clearTimeout(pressTimer);
    openEssenceModal(herb);
  });
  btn.addEventListener('click', () => {
    if (longPressTriggered) { longPressTriggered = false; return; }
    toggleTileSelection(herb.tileUid);
  });
  return btn;
}

function renderSolvedRows() {
  const container = document.getElementById('solved-rows');
  container.innerHTML = '';
  for (const group of state.solvedGroups) {
    const color = GROUP_COLORS[group.colorIdx % GROUP_COLORS.length];
    const row = document.createElement('div');
    row.className = `animate-slide-down rounded-xl p-3 sm:p-4 ${color.bg} ${color.text} shadow-lg`;
    row.innerHTML = `
      <div class="font-bold text-sm sm:text-base">${escapeHtml(group.category)}${group.revealed ? ' <span class="text-xs font-normal opacity-70">(נחשף)</span>' : ''}</div>
      <div class="text-xs sm:text-sm opacity-90 mt-0.5">${group.herbs.map(h => escapeHtml(h.pinyin_name)).join(' • ')}</div>`;
    container.appendChild(row);
  }
}

function renderBoardArea() {
  const area = document.getElementById('board-area');
  area.innerHTML = '';
  if (state.roundOver) {
    const won = state.currentTiles.length === 0 && state.solvedGroups.every(g => !g.revealed);
    const banner = document.createElement('div');
    banner.className = 'flex flex-col items-center justify-center gap-3 py-8 bg-slate-800/50 rounded-xl border border-slate-700';
    banner.innerHTML = `<div class="text-lg font-bold">${won ? '🎉 הסיבוב הושלם!' : '⏰ נגמרו החיים - התשובות נחשפו'}</div>`;
    const btn = document.createElement('button');
    btn.className = 'px-6 py-2 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-bold';
    btn.textContent = 'המשך';
    btn.addEventListener('click', proceedAfterRound);
    banner.appendChild(btn);
    area.appendChild(banner);
    return;
  }
  const grid = document.createElement('div');
  grid.id = 'tiles-grid';
  grid.className = 'grid grid-cols-4 gap-1.5 sm:gap-3';
  for (const herb of state.currentTiles) grid.appendChild(createTileElement(herb));
  area.appendChild(grid);
}

function renderGame() {
  const app = document.getElementById('app');
  const studied = state.categories.reduce((s, c) => s + state.pools[c].seen.length, 0);
  const heartsHtml = Array.from({ length: MAX_LIVES }, (_, i) => i < state.lives ? '❤️' : '🤍').join(' ');
  const pct = state.initialTotal ? (studied / state.initialTotal * 100).toFixed(1) : 0;

  app.innerHTML = `
    <div class="w-full max-w-2xl flex flex-col gap-4">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="text-xs text-slate-400">סיבוב ${state.roundNumber}</div>
          <div class="text-sm text-slate-300">נלמדו ${studied} מתוך ${state.initialTotal} עשבים</div>
        </div>
        <div class="text-xl" title="חיים">${heartsHtml}</div>
        <button id="btn-new-game" class="text-xs px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300">משחק חדש</button>
      </div>
      <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full bg-indigo-500 transition-all" style="width:${pct}%"></div>
      </div>
      <div id="solved-rows" class="flex flex-col gap-2"></div>
      <div id="board-area"></div>
      <div class="flex items-center justify-center gap-3">
        <button id="btn-deselect" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-600 text-sm font-medium disabled:opacity-40">נקה בחירה</button>
        <button id="btn-submit" class="px-6 py-2 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-bold disabled:opacity-30 disabled:cursor-not-allowed">שלח</button>
      </div>
      <div class="text-center text-xs text-slate-500">לחיצה ארוכה (או קליק ימני) על אריח מציגה את התמצית שלו</div>
    </div>`;

  document.getElementById('btn-new-game').addEventListener('click', () => {
    if (confirm('להתחיל משחק חדש? ההתקדמות בסיבוב הנוכחי תאבד.')) resetToSetup();
  });
  document.getElementById('btn-deselect').addEventListener('click', () => { state.selectedTileUids = []; render(); });
  document.getElementById('btn-submit').addEventListener('click', handleSubmit);
  document.getElementById('btn-submit').disabled = state.selectedTileUids.length !== 4 || state.roundOver;
  document.getElementById('btn-deselect').disabled = state.selectedTileUids.length === 0;

  renderSolvedRows();
  renderBoardArea();
}

function renderVictory() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="max-w-md w-full text-center mt-16 flex flex-col gap-4 items-center">
      <div class="text-5xl">🏆</div>
      <h1 class="text-2xl font-extrabold">כל הכבוד!</h1>
      <p class="text-slate-300">סיימתם ${state.initialTotal} עשבים מתוך ${state.categories.length} קטגוריות ב-${state.roundNumber} סיבובים.</p>
      <div class="text-sm text-slate-400">${state.categories.map(escapeHtml).join(' • ')}</div>
      <button id="btn-play-again" class="mt-4 px-8 py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white font-bold">שחקו שוב</button>
    </div>`;
  document.getElementById('btn-play-again').addEventListener('click', resetToSetup);
}

/* ============================================================
   BOOT
   ============================================================ */
render();
</script>
</body>
</html>
